name: trip_manager
description: Fleet Trip Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  dio: ^5.4.3+1
  http: ^1.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
